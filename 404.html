<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Shayne's AI Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-dark: #0f172a; --brand-teal: #14b8a6; --brand-cyan: #06b6d4; --brand-accent: #2dd4bf; --text-primary: #f8fafc; --text-secondary: #94a3b8; --bg-primary: #0f172a; --bg-secondary: #1e293b; --border: #334155; --space-sm: 1rem; --space-md: 1.5rem; --space-lg: 2rem; --space-xl: 3rem; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-primary); background: var(--bg-primary); line-height: 1.6; }
        .container { max-width: 700px; margin: 0 auto; padding: 0 20px; text-align: center; }
        h1 { font-size: 3rem; font-weight: 800; margin-bottom: var(--space-md); }
        p { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: var(--space-lg); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.875rem 1.75rem; border-radius: 8px; font-weight: 600; font-size: 1rem; text-decoration: none; background: linear-gradient(135deg, var(--brand-teal), var(--brand-cyan)); color: var(--brand-dark); }
        .btn:hover { transform: translateY(-2px); }
        main { min-height: 70vh; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <h1>404</h1>
            <p>This page doesn't exist. The fastest way back is the free diagnostic.</p>
            <a href="/diagnostic" class="btn">Take the Free Diagnostic</a>
        </div>
    </main>
</body>
</html>
